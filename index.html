}

/* =========================
   API FETCH: anti-429 (queue + throttle + retry + cache)
========================= */
const API_CACHE = new Map();
function clearApiCache(){ API_CACHE.clear(); lastFetchTs = 0; }

const fetchQueue = [];
let queueRunning = false;
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function queuedFetch(url, options = {}){
  return new Promise((resolve, reject) => {
    fetchQueue.push({ url, options, resolve, reject });
    if (!queueRunning) runQueue();
  });
}

async function runQueue(){
  queueRunning = true;
  while(fetchQueue.length){
    const job = fetchQueue.shift();
    const wait = Math.max(0, MIN_GAP_MS - (Date.now() - lastFetchTs));
    if (wait) await sleep(wait);
    lastFetchTs = Date.now();

    try {
      const data = await fetchWithRetry(job.url, job.options);
      job.resolve(data);
    } catch (e) {
      job.reject(e);
    }
  }
  queueRunning = false;
}

async function fetchWithRetry(url, options={}, maxRetry=6){
  const cached = API_CACHE.get(url);
  if (cached && (Date.now() - cached.ts) < CACHE_TTL_MS) return cached.data;

  let attempt = 0;
  let backoff = 650;

  while(true){
    attempt++;
    const res = await fetch(url, options);

    if (res.ok){
      const json = await res.json();
      API_CACHE.set(url, { ts: Date.now(), data: json });
      return json;
    }

    if (res.status === 404){
      throw new Error('HTTP_404');
    }

    if (res.status === 429 && attempt <= maxRetry){
      const ra = res.headers.get('Retry-After');
      const waitMs = ra ? (parseFloat(ra) * 1000) : backoff;
      await sleep(waitMs);
      backoff = Math.min(backoff * 1.7, 7000);
      continue;
    }

    throw new Error('HTTP_' + res.status);
  }
}

async function fetchAPI(url, options){
  try { return await queuedFetch(url, options); }
  catch (e){ return { error:true, code:e.message }; }
}

function moneyFR(n){ try { return Number(n||0).toLocaleString('fr-FR'); } catch { return String(n||0); } }

function humanDate(ts){
  const d = new Date(ts);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const that = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
  const diffDays = Math.round((today - that) / 86400000);
  if (diffDays === 0) return "aujourd'hui";
  if (diffDays === 1) return "hier";
  return d.toLocaleDateString('fr-FR');
}

function fmtSecondsToHMS(sec){
  const s = Number(sec)||0;
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

/* ✅ POINTS NORMALIZER (fiable)
   - "192.15" => "19215"
   - "19215.032958..." => "19215"
   - "19 215 032 ..." => enlève espaces
*/
function normalizePoints(v){
  if (v === null || v === undefined) return "0";

  const str = (typeof v === "string") ? v : String(v);

  // nettoie espaces
  const t = str.replace(/\s+/g,'').trim();
  if (!t) return "0";

  // cas exact "ddd.dd" ou "ddd,dd" => on supprime séparateur (192.15 => 19215)
  if (/^\d{1,3}[.,]\d{2}$/.test(t)){
    return t.replace(/[.,]/,'');
  }

  // cas float long => on garde partie entière
  if (/[.,]/.test(t)){
    return t.split(/[.,]/)[0] || "0";
  }

  // entier
  return t;
}

const PSEUDO_CACHE_KEY = "wolf_pseudo_cache_v2";
function loadPseudoCache(){ try { return JSON.parse(localStorage.getItem(PSEUDO_CACHE_KEY) || '{}'); } catch { return {}; } }
function savePseudoCache(c){ localStorage.setItem(PSEUDO_CACHE_KEY, JSON.stringify(c)); }

async function fetchPseudoForSteamid(steamid){
  const cache = loadPseudoCache();
  if (cache[steamid]) return cache[steamid];

  const r = await fetchAPI(`${API_BASE}/global/player/${steamid}`);
  if (!r.error){
    // Support formats: {data:{last_name}} ou {data:{player_name}} ou racine
    const d = r.data || {};
    const pseudo = d.last_name || d.player_name || r.last_name || r.player_name;
    if (pseudo){
      cache[steamid] = pseudo;
      savePseudoCache(cache);
      return pseudo;
    }
  }
  return null;
}

const BANK_KEY = 'wolf_bank_tracker_v2';
function loadBankTracker(){ try { return JSON.parse(localStorage.getItem(BANK_KEY) || '{"lastTotal":null,"history":[]}'); } catch { return { lastTotal:null, history:[] }; } }
function saveBankTracker(obj){ localStorage.setItem(BANK_KEY, JSON.stringify(obj)); }
function pushBankDelta(delta, newTotal){
  const t = loadBankTracker();
  t.history.unshift({ ts: Date.now(), delta: Number(delta)||0, total: Number(newTotal)||0 });
  t.history = t.history.slice(0, 600);
  t.lastTotal = Number(newTotal)||0;
  saveBankTracker(t);
}

/* =========================
   SEMAINE (samedi 19h30 → samedi 19h30)
========================= */
function getSaturday1930Start(nowMs = Date.now()){
  const d = new Date(nowMs);
  const day = d.getDay(); // 0 dim ... 6 sam
  const diffToSat = (day - 6 + 7) % 7;
  const sat = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  sat.setDate(sat.getDate() - diffToSat);
  sat.setHours(19,30,0,0);
  let start = sat.getTime();
  if (nowMs < start) start -= 7*86400000;
  return start;
}

/* =========================
   Contribution (AUTO via banklogs)
   + archive locale si tu veux garder un historique visuel
========================= */
const CONTRIB_STORE_KEY = "wolf_contrib_archive_v1";
function loadContribArchive(){
  try { return JSON.parse(localStorage.getItem(CONTRIB_STORE_KEY) || '{"weekStart":0,"archives":[]}'); }
  catch { return { weekStart:0, archives:[] }; }
}
function saveContribArchive(x){ localStorage.setItem(CONTRIB_STORE_KEY, JSON.stringify(x)); }
function ensureContribWeek(){
  const ws = getSaturday1930Start(Date.now());
  const a = loadContribArchive();
  if (!a.weekStart){
    a.weekStart = ws; saveContribArchive(a); return a;
  }
  if (a.weekStart !== ws){
    // on archive l'ancien “résumé” (si tu veux)
    a.archives.unshift({ start: a.weekStart, archivedAt: Date.now() });
    a.weekStart = ws;
    a.archives = a.archives.slice(0, 20);
    saveContribArchive(a);
  }
  return a;
}

/* =========================
   Playtime (AUTO) + archive locale (snapshot)
========================= */
const PLAY_KEY = 'wolf_playtime_v1';
function loadPlayStore(){ try { return JSON.parse(localStorage.getItem(PLAY_KEY) || 'null'); } catch { return null; } }
function savePlayStore(s){ localStorage.setItem(PLAY_KEY, JSON.stringify(s)); }

function ensurePlayStore(){
  const start = getSaturday1930Start(Date.now());
  let store = loadPlayStore();
  if (!store || !store.week || !Array.isArray(store.archives)){
    store = { week:{ start, snapshot:{} }, archives:[] };
    savePlayStore(store);
    return store;
  }
  if (store.week.start !== start){
    store.archives.unshift({
      start: store.week.start,
      archivedAt: Date.now(),
      snapshot: store.week.snapshot || {}
    });
    store.week = { start, snapshot:{} };
    store.archives = store.archives.slice(0, 20);
    savePlayStore(store);
  }
  return store;
}

async function loadSection(section){
  if (familyId === null) await initFamilyId();
  ensureContribWeek();
  ensurePlayStore();

  if (section === 'membres') return loadMembres();
  if (section === 'banque') return loadBanque();
  if (section === 'points') return loadPoints();
  if (section === 'classement') return loadClassement();
  if (section === 'contribution') return loadContribution();
  if (section === 'playtime') return loadPlaytime();
  if (section === 'docs') return loadDocs();
  if (section === 'settings') return loadSettings();
}

/* -------- Banque -------- */
async function loadBanque(){
  const data = await fetchAPI(`${API_BASE}/darkrp/familles/${familyId}/infos`);
  if (data.error){
    contentArea.innerHTML = `<div class="card"><div class="card-body"><div class="alert alert-warning mb-0"><strong>Erreur :</strong> impossible de charger la banque.</div></div></div>`;
    return;
  }

  const money = (data.money ?? data.data?.money ?? 0);

  const tracker = loadBankTracker();
  if (typeof money === 'number'){
    if (tracker.lastTotal === null){
      tracker.lastTotal = money;
      saveBankTracker(tracker);
    } else if (money !== tracker.lastTotal){
      const delta = money - tracker.lastTotal;
      pushBankDelta(delta, money);
    }
  }

  const t = loadBankTracker();
  const hist = Array.isArray(t.history) ? t.history : [];

  const todayYmd = new Date().toISOString().slice(0,10);
  const weekAgo = new Date(Date.now() - 6*86400000).toISOString().slice(0,10);

  contentArea.innerHTML = `
    <h1 class="h2 mb-3">Banque famille</h1>

    <div class="row g-3 mb-3">
      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <div class="fw-bold" style="color:var(--accent) !important;">Total</div>
            <div class="display-6 fw-bold">${moneyFR(money)} $</div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card">
          <div class="card-body">
            <div class="row g-2 align-items-end">
              <div class="col-md-3">
                <label class="fw-bold mb-1">Type</label>
                <select id="bank-type" class="form-select form-select-sm">
                  <option value="gain">Gains</option>
                  <option value="loss">Pertes</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="fw-bold mb-1">Début</label>
                <input id="bank-start" type="date" class="form-control form-control-sm" value="${weekAgo}"/>
              </div>
              <div class="col-md-3">
                <label class="fw-bold mb-1">Fin</label>
                <input id="bank-end" type="date" class="form-control form-control-sm" value="${todayYmd}"/>
              </div>
              <div class="col-md-3">
                <button id="bank-calc" class="btn btn-info w-100"><i class="fa-solid fa-calculator me-2"></i>Calculer</button>
              </div>
            </div>

            <div class="mt-3">
              <span class="pill"><i class="fa-solid fa-chart-line"></i><span>Total période :</span><span id="bank-total-period">—</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
          <div class="h5 mb-0 fw-bold">Historique</div>
          <div class="fw-bold">Lignes: ${hist.length}</div>
        </div>

        <div class="d-grid gap-2" id="bank-history">
          ${
            hist.length ? hist.slice(0, 40).map(x => `
              <div class="history-item d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div>
                  <div class="fw-bold">${humanDate(x.ts)}</div>
                  <div class="${x.delta>=0?'delta-plus':'delta-minus'}">${x.delta>=0?'+':''}${moneyFR(x.delta)} $</div>
                </div>
                <div class="fw-bold">Total après: ${moneyFR(x.total)} $</div>
              </div>
            `).join('') : `<div class="history-item fw-bold">Aucun changement détecté.</div>`
          }
        </div>
      </div>
    </div>
  `;

  function betweenDates(ts, startYmd, endYmd){
    if (!startYmd || !endYmd) return true;
    const start = new Date(startYmd + "T00:00:00").getTime();
    const end = new Date(endYmd + "T23:59:59").getTime();
    return ts >= start && ts <= end;
  }

  document.getElementById('bank-calc').addEventListener('click', () => {
    const type = document.getElementById('bank-type').value;
    const start = document.getElementById('bank-start').value;
    const end = document.getElementById('bank-end').value;

    let total = 0;
    for (const x of hist){
      if (!betweenDates(x.ts, start, end)) continue;
      if (type === 'gain' && x.delta > 0) total += x.delta;
      if (type === 'loss' && x.delta < 0) total += Math.abs(x.delta);
    }
    document.getElementById('bank-total-period').textContent = moneyFR(total) + ' $';
  });
}

/* -------- Contribution (AUTO via banklogs) -------- */
async function loadContribution(){
  const weekStartMs = getSaturday1930Start(Date.now());
  const weekStart = new Date(weekStartMs);
  const weekEnd = new Date(weekStartMs + 7*86400000);

  // members + pseudo map
  const memData = await fetchAPI(`${API_BASE}/darkrp/familles/${familyName}/members`);
  const members = (!memData.error && Array.isArray(memData.data)) ? memData.data : [];
  const meta = loadMemberMeta();

  const pseudoBySteam = {};
  for (const m of members){
    pseudoBySteam[m.steamid] = meta[m.steamid]?.pseudo || m.steamid;
  }

  // ✅ Banklogs API (si existe)
  // NOTE: ton doc semble indiquer: /darkrp/familles/{familyName}/banklogs
  const logsRes = await fetchAPI(`${API_BASE}/darkrp/familles/${familyName}/banklogs?limit=200`);

  let rows = [];
  if (!logsRes.error){
    // support formats
    if (Array.isArray(logsRes.data)) rows = logsRes.data;
    else if (Array.isArray(logsRes.data?.data)) rows = logsRes.data.data;
    else if (Array.isArray(logsRes.data?.data?.data)) rows = logsRes.data.data.data;
  }

  // filtre semaine
  const weekRows = rows.filter(x => {
    const ts = x.date ? Date.parse(x.date) : 0;
    return ts && ts >= weekStartMs && ts < (weekStartMs + 7*86400000);
  });

  // agrégation
  const perSteam = {};
  function ensure(steam){
    if (!perSteam[steam]) perSteam[steam] = { deposit:0, withdraw:0, net:0 };
    return perSteam[steam];
  }

  for (const x of weekRows){
    const steam = x.steamid || x.steamid64 || "";
    const type = String(x.type || "").toLowerCase();
    const amount = Number(x.money ?? x.amount ?? 0) || 0;

    const s = ensure(steam || "unknown");
    if (type.includes("deposit")) s.deposit += amount;
    else s.withdraw += amount;
  }
  for (const k of Object.keys(perSteam)){
    perSteam[k].net = perSteam[k].deposit - perSteam[k].withdraw;
  }

  contentArea.innerHTML = `
    <h1 class="h2 mb-3">Contribution</h1>

    <div class="row g-3 mb-3">
      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <div class="fw-bold" style="color:var(--accent) !important;">Semaine (samedi 19h30 → samedi 19h30)</div>
            <div class="fw-bold mt-1">
              ${weekStart.toLocaleDateString('fr-FR')} ${weekStart.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
              → ${weekEnd.toLocaleDateString('fr-FR')} ${weekEnd.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
            </div>
            <div class="divider"></div>
            <div class="fw-bold">${logsRes.error ? "BankLogs indisponible (API 404/429) ⚠️" : "BankLogs connecté ✅"}</div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card">
          <div class="card-body">
            <div class="h5 fw-bold mb-3">Derniers mouvements (API)</div>
            <div id="contrib-list" class="d-grid gap-2"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="h5 fw-bold mb-3">Résumé par joueur (semaine)</div>
        <div id="contrib-summary" class="d-grid gap-2"></div>
      </div>
    </div>
  `;

  // list
  const listWrap = document.getElementById("contrib-list");
  if (logsRes.error){
    listWrap.innerHTML = `<div class="history-item fw-bold">Impossible d'afficher les contributions automatiquement (banklogs indisponible).</div>`;
  } else if (!weekRows.length){
    listWrap.innerHTML = `<div class="history-item fw-bold">Aucun mouvement sur la semaine.</div>`;
  } else {
    listWrap.innerHTML = weekRows.slice(0,60).map(x => {
      const steam = x.steamid || x.steamid64 || "";
      const pseudo = pseudoBySteam[steam] || steam || "—";
      const type = String(x.type || "log");
      const ts = x.date ? Date.parse(x.date) : Date.now();
      const amount = Number(x.money ?? x.amount ?? 0) || 0;
      const isPlus = String(type).toLowerCase().includes("deposit");
      return `
        <div class="history-item d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <div class="fw-bold">${escapeHtml(pseudo)}</div>
            <div class="fw-bold">${escapeHtml(type)} · ${humanDate(ts)}</div>
          </div>
          <div class="${isPlus ? 'delta-plus':'delta-minus'}">${isPlus?'+':'-'}${moneyFR(amount)} $</div>
        </div>
      `;
    }).join('');
  }

  // summary
  const sumWrap = document.getElementById("contrib-summary");

  const steamsInFamily = members.map(m => m.steamid);
  const lines = steamsInFamily.map(steam => {
    const pseudo = pseudoBySteam[steam] || steam;
    const s = perSteam[steam] || { deposit:0, withdraw:0, net:0 };
    return `
      <div class="history-item d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div class="fw-bold">${escapeHtml(pseudo)}</div>
        <div class="fw-bold">
          <span class="delta-plus">+${moneyFR(s.deposit)}$</span>
          · <span class="delta-minus">-${moneyFR(s.withdraw)}$</span>
          · <span class="delta-net">Net: ${moneyFR(s.net)}$</span>
        </div>
      </div>
    `;
  });

  sumWrap.innerHTML = lines.length ? lines.join('') : `<div class="history-item fw-bold">Aucun membre.</div>`;
}

/* -------- Playtime -------- */
async function loadPlaytime(){
  const store = ensurePlayStore();
  const weekStart = new Date(store.week.start);
  const weekEnd = new Date(store.week.start + 7*86400000);

  const memData = await fetchAPI(`${API_BASE}/darkrp/familles/${familyName}/members`);
  const members = (!memData.error && Array.isArray(memData.data)) ? memData.data : [];
  const meta = loadMemberMeta();

  const pseudoBySteam = {};
  for (const m of members){
    pseudoBySteam[m.steamid] = meta[m.steamid]?.pseudo || m.steamid;
  }

  // Endpoint playtime depuis doc (tu m’avais cité: /api/darkrp/familles/playtime)
  const headers = {};
  if (PLAYTIME_TOKEN){
    // si tu mets "Bearer xxx" ça marche, sinon tu peux mettre juste le token
    headers["Authorization"] = PLAYTIME_TOKEN.includes("Bearer") ? PLAYTIME_TOKEN : ("Bearer " + PLAYTIME_TOKEN);
  }

  const pt = await fetchAPI(`${API_BASE}/darkrp/familles/playtime`, { headers });
  let dataMap = null;

  if (!pt.error){
    if (pt.data && typeof pt.data === "object") dataMap = pt.data;
    if (pt.data?.data && typeof pt.data.data === "object") dataMap = pt.data.data;
  }

  contentArea.innerHTML = `
    <h1 class="h2 mb-3">Playtime</h1>

    <div class="row g-3 mb-3">
      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <div class="fw-bold" style="color:var(--accent) !important;">Semaine (samedi 19h30 → samedi 19h30)</div>
            <div class="fw-bold mt-1">
              ${weekStart.toLocaleDateString('fr-FR')} ${weekStart.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
              → ${weekEnd.toLocaleDateString('fr-FR')} ${weekEnd.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
            </div>
            <div class="divider"></div>
            <div class="fw-bold">${dataMap ? "API Playtime ✅" : "API Playtime indisponible ⚠️"}</div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card">
          <div class="card-body">
            <div class="h5 fw-bold mb-3">Joueurs</div>
            <div id="pt-list" class="d-grid gap-2"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="h5 fw-bold mb-3">Historique (archives)</div>
        <div id="pt-archives" class="d-grid gap-2"></div>
      </div>
    </div>
  `;

  if (dataMap && typeof dataMap === "object"){
    store.week.snapshot = dataMap;
    savePlayStore(store);
  }

  const listWrap = document.getElementById("pt-list");
  if (!dataMap){
    listWrap.innerHTML = `<div class="history-item fw-bold">Impossible de récupérer le playtime (API 404/429, token manquant, ou format non reconnu).</div>`;
  } else {
    const entries = Object.entries(dataMap);
    entries.sort((a,b)=> Number(b[1]) - Number(a[1]));
    listWrap.innerHTML = entries.slice(0,50).map(([k,v]) => {
      const pseudo = pseudoBySteam[k] || k;
      return `
        <div class="history-item d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div class="fw-bold">${escapeHtml(pseudo)}</div>
          <div class="fw-bold">${escapeHtml(k)}</div>
          <div class="pill"><i class="fa-solid fa-clock"></i><span>${fmtSecondsToHMS(v)}</span></div>
        </div>
      `;
    }).join('') || `<div class="history-item fw-bold">Aucune donnée.</div>`;
  }

  const archWrap = document.getElementById("pt-archives");
  if (!store.archives.length){
    archWrap.innerHTML = `<div class="history-item fw-bold">Aucune archive pour le moment.</div>`;
  } else {
    archWrap.innerHTML = store.archives.slice(0,10).map(a => {
      const snap = a.snapshot || {};
      const top = Object.entries(snap).sort((x,y)=>Number(y[1])-Number(x[1])).slice(0,6);
      return `
        <div class="history-item">
          <div class="fw-bold">Semaine démarrée: ${new Date(a.start).toLocaleString('fr-FR')}</div>
          <div class="divider"></div>
          <div class="d-grid gap-2">
            ${top.map(([k,v]) => `
              <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div class="fw-bold">${escapeHtml(k)}</div>
                <div class="pill"><i class="fa-solid fa-clock"></i><span>${fmtSecondsToHMS(v)}</span></div>
              </div>
            `).join('') || `<div class="fw-bold">—</div>`}
          </div>
        </div>
      `;
    }).join('');
  }
}

/* -------- Paramètres -------- */
async function loadSettings(){
  const currentHash = getAdminHash();
  const isDefault = currentHash === DEFAULT_ADMIN_PASS_SHA256;

  contentArea.innerHTML = `
    <h1 class="h2 mb-3">Paramètres</h1>

    <div class="card">
      <div class="card-body">
        <div class="h5 fw-bold mb-2">Changer le code Admin (PIN 4 chiffres)</div>
        <div class="fw-bold mb-3">Sécurité : code 6 chiffres requis.</div>

        <div class="row g-2">
          <div class="col-md-4">
            <label class="fw-bold mb-1">Code sécurité (6 chiffres)</label>
            <input id="sec-code" class="form-control" inputmode="numeric" maxlength="6" placeholder="091103"/>
          </div>

          <div class="col-md-4">
            <label class="fw-bold mb-1">Nouveau PIN admin (4 chiffres)</label>
            <input id="new-pin" class="form-control" inputmode="numeric" maxlength="4" placeholder="0000"/>
          </div>

          <div class="col-md-4">
            <label class="fw-bold mb-1">Confirmer PIN</label>
            <input id="new-pin2" class="form-control" inputmode="numeric" maxlength="4" placeholder="0000"/>
          </div>

          <div class="col-12 mt-2">
            <button id="save-pin" class="btn btn-info"><i class="fa-solid fa-floppy-disk me-2"></i>Enregistrer</button>
            <button id="reset-pin" class="btn btn-outline-light ms-2"><i class="fa-solid fa-rotate-left me-2"></i>Revenir au PIN par défaut</button>
          </div>

          <div class="col-12 mt-3">
            <div class="history-item fw-bold">
              Statut: ${isDefault ? "PIN admin = par défaut" : "PIN admin = personnalisé (stocké localement)"}
            </div>
            <div id="settings-msg" class="mt-2 fw-bold"></div>
          </div>
        </div>
      </div>
    </div>
  `;

  const msg = document.getElementById("settings-msg");

  document.getElementById("save-pin").addEventListener("click", async () => {
    const sec = (document.getElementById("sec-code").value || "").trim();
    const p1 = (document.getElementById("new-pin").value || "").trim();
    const p2 = (document.getElementById("new-pin2").value || "").trim();

    msg.textContent = "";
    msg.style.color = "#fff";

    if (sec !== SECURITY_CODE){
      msg.textContent = "❌ Code sécurité incorrect.";
      msg.style.color = "#ff7c7c";
      return;
    }
    if (!/^\d{4}$/.test(p1) || !/^\d{4}$/.test(p2)){
      msg.textContent = "❌ Le PIN doit faire 4 chiffres.";
      msg.style.color = "#ff7c7c";
      return;
    }
    if (p1 !== p2){
      msg.textContent = "❌ Les deux PIN ne correspondent pas.";
      msg.style.color = "#ff7c7c";
      return;
    }

    const h = await sha256Hex(p1);
    localStorage.setItem(ADMIN_HASH_KEY, h);
    msg.textContent = "✅ PIN admin mis à jour. (pense à te reconnecter en admin)";
    msg.style.color = "#7CFFB2";
  });

  document.getElementById("reset-pin").addEventListener("click", () => {
    localStorage.removeItem(ADMIN_HASH_KEY);
    msg.textContent = "✅ Retour au PIN admin par défaut.";
    msg.style.color = "#7CFFB2";
  });
}
