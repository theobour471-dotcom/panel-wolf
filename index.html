<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Wolf - Classement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --panel: #001f3f; --accent: #a0c4ff; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; padding: 30px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        .rank-card { background: var(--panel); border: 1px solid #003366; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .rank-card:hover { transform: scale(1.01); background: #002a54; }
        .gold { color: gold; } .silver { color: #c0c0c0; } .bronze { color: #cd7f32; }
        .pts-badge { background: rgba(160, 196, 255, 0.1); padding: 5px 15px; border-radius: 10px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la Meute</a>
    
    <h2 class="mb-4">Top Familles du Serveur</h2>
    <div id="leaderboard">
        <div class="text-center p-5">Analyse des puissances en cours...</div>
    </div>

    <script>
        const FAMILIES = ['Esperados','Maness','Colman','Kittygang','Wolf','Bliyatzz','Pinkpanther','varzak','Blackwall','Cosanostra','Rollin','Bratva','Bako'];

        // Le fameux Fix Points
        function clean(v) {
            let s = String(v || "0").replace(/\s+/g, '');
            if (s.includes('.') || s.includes(',')) {
                let p = s.split(/[.,]/);
                return p[1] && p[1].length === 2 ? p[0] + p[1] : p[0];
            }
            return s;
        }

        async function loadLeaderboard() {
            const area = document.getElementById('leaderboard');
            
            // On récupère toutes les infos en même temps (plus rapide)
            const results = await Promise.all(FAMILIES.map(async (name) => {
                try {
                    const r = await fetch(`https://api.lyg.fr/api/darkrp/familles/${name}/infos`).then(d => d.json());
                    return { name, pts: parseInt(clean(r.points || r.data?.points || 0)) };
                } catch { return { name, pts: 0 }; }
            }));

            // Tri du plus grand au plus petit
            results.sort((a, b) => b.pts - a.pts);

            let html = "";
            results.forEach((f, i) => {
                let medal = "";
                if(i === 0) medal = '<i class="fas fa-crown gold"></i> ';
                if(i === 1) medal = '<i class="fas fa-medal silver"></i> ';
                if(i === 2) medal = '<i class="fas fa-medal bronze"></i> ';

                html += `
                <div class="rank-card">
                    <span><b class="me-3">#${i+1}</b> ${medal}${f.name}</span>
                    <span class="pts-badge">${f.pts.toLocaleString()} PTS</span>
                </div>`;
            });
            area.innerHTML = html;
        }

        loadLeaderboard();
    </script>
</body>
</html>
